<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uma Escolha</title>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
    color:white;
    font-family:'Special Elite', monospace;
    overflow:hidden;
    position:relative;
}

/* Fundo VHS */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05) 0px,
        rgba(255,255,255,.05) 2px,
        transparent 4px,
        transparent 6px
    );
    animation:vhs .12s linear infinite;
    pointer-events:none;
}

body::after{
    content:"";
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle, transparent 60%, rgba(0,0,0,.65)),
    linear-gradient(90deg,
    rgba(255,0,0,.03),
    transparent,
    rgba(0,255,255,.03));
    pointer-events:none;
}

@keyframes vhs{
    from{transform:translateY(0);}
    to{transform:translateY(6px);}
}

.caixa{
    text-align:center;
    z-index:2;
}

h1{
    margin-bottom:30px;
    font-size:40px;
}

button{
    padding:15px 35px;
    margin:10px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    font-size:22px;
    transition:.3s;
}

#sim{
    background:#ff4f91;
    color:white;
}

#nao{
    background:#555;
    color:white;
}

button:hover{
    transform:scale(1.08);
}
</style>

</head>
<body>

<div class="caixa">
    <h1>Qual dessas escolhas?</h1>

    <button id="sim">Sim ❤️</button>
    <button id="nao">Não 💔</button>
</div>

<script>
document.getElementById("nao").onclick=()=>{
    alert("Não não 😅");
}

document.getElementById("sim").onclick=()=>{
    location.href="beijo.html";
}
</script>

</body>
</html>
