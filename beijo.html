 
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vale Beijo</title>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
    color:white;
    font-family:'Special Elite', monospace;
    overflow:hidden;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05) 0px,
        rgba(255,255,255,.05) 2px,
        transparent 4px,
        transparent 6px
    );
    animation:vhs .12s linear infinite;
    pointer-events:none;
}

body::after{
    content:"";
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle, transparent 60%, rgba(0,0,0,.65)),
    linear-gradient(90deg,
    rgba(255,0,0,.03),
    transparent,
    rgba(0,255,255,.03));
    pointer-events:none;
}

@keyframes vhs{
    from{transform:translateY(0);}
    to{transform:translateY(6px);}
}

.caixa{
    text-align:center;
    z-index:2;
}

h1{
    font-size:52px;
    color:#ff5d9e;
}

p{
    margin-top:15px;
    font-size:25px;
}

.botoes{
    margin-top:40px;
}

button{
    padding:15px 35px;
    margin:10px;
    border:none;
    border-radius:40px;
    font-size:22px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

#sim{
    background:#ff4f91;
    color:white;
}

#absoluta{
    background:#ffb703;
    color:black;
}
</style>
</head>

<body>

<div class="caixa">
    <h1>Agora você me deve um beijo 🫦</h1>

<h2 style="margin-top:15px; color:#ffc8dd;">
    Only if you want. ❤️
</h2>

<p>Validade até <strong>15/12/26</strong></p>

    <div class="botoes">
        <button id="sim">Sim ❤️</button>
        <button id="absoluta">Absoluta 😍</button>
    </div>
</div>

<script>
document.getElementById("sim").onclick = () => {
    alert("Eu já sabia que você ia aceitar! ❤️");
}

document.getElementById("absoluta").onclick = () => {
    alert("Resposta correta! Agora o beijo é oficial. 🫦❤️");
}
</script>

</body>
</html>
